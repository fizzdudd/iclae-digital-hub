<style>
    .sidebar {
        width: var(--sidebar-width);
        background: var(--sidebar-bg);
        position: fixed;
        inset: 0 auto 0 0;
        z-index: 100;
        display: flex;
        flex-direction: column;
    }

    .sidebar-logo {
        border-bottom: 1px solid var(--sidebar-border);
        padding: 20px 18px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .logo-mark {
        width: 34px;
        height: 34px;
        border-radius: var(--radius-sm);
        background: linear-gradient(135deg, #3b82f6, #1d4ed8);
        display: flex;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-size: 13px;
        font-weight: 700;
        flex-shrink: 0;
    }

    .logo-title { color: #fff; font-size: 15px; font-weight: 700; line-height: 1.1; }
    .logo-sub {
        margin-top: 2px;
        color: rgba(255,255,255,0.45);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.4px;
    }

    .sidebar-nav {
        flex: 1;
        overflow-y: auto;
        padding: 12px 10px;
    }

    .nav-section-label {
        font-size: 10px;
        color: rgba(255,255,255,0.34);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        font-weight: 700;
        padding: 8px 8px 4px;
    }

    .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        border-radius: var(--radius-md);
        text-decoration: none;
        color: var(--sidebar-text);
        font-size: 13.5px;
        font-weight: 500;
        padding: 9px 10px;
        margin-bottom: 2px;
    }

    .nav-item:hover {
        background: var(--sidebar-hover);
        color: #fff;
    }

    .nav-item.active {
        background: var(--sidebar-active);
        color: var(--sidebar-text-active);
        font-weight: 700;
    }

    .nav-icon {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
        opacity: 0.84;
    }

    .nav-item.active .nav-icon {
        color: var(--sidebar-accent);
        opacity: 1;
    }

    .nav-badge {
        margin-left: auto;
        font-size: 10px;
        padding: 2px 7px;
        border-radius: 999px;
        font-weight: 700;
        color: #93c5fd;
        background: rgba(96,165,250,0.2);
    }

    .sidebar-user {
        border-top: 1px solid var(--sidebar-border);
        padding: 12px 14px;
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .user-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        flex-shrink: 0;
    }

    .user-name { color: #fff; font-size: 13px; font-weight: 600; }
    .user-role { color: rgba(255,255,255,0.45); font-size: 10.5px; }

    @media (max-width: 1024px) {
        .logo-sub,
        .logo-title,
        .nav-section-label,
        .nav-item span,
        .nav-badge,
        .sidebar-user { display: none; }

        .sidebar-logo,
        .nav-item { justify-content: center; }
    }

    @media (max-width: 700px) {
        .sidebar { display: none; }
    }
</style>
